name: MLOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'   # every Sunday midnight UTC — weekly retrain

jobs:
  test-and-train:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Python 3.13
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      

      # 5. Run test suite
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      # 6. Retrain model (triggered on push OR weekly schedule)
      - name: Retrain model
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python src/models/train.py
          python src/models/experiment.py
       - name: Retrain model
        continue-on-error: true
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python src/models/train.py
          python src/models/experiment.py



      # 7. Version new model with DVC
      - name: Version model artifact
        run: |
          dvc add models/svd_best_model.pkl
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add models/svd_best_model.pkl.dvc
          git commit -m "ci: retrain model [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"
